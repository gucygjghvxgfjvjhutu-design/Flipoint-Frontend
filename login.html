<!DOCTYPE html>
<html class="dark" lang="id">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>FLIPOINT | Masuk</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="assets/js/tailwind-config.js"></script>
<link rel="stylesheet" href="assets/css/site.css">
<style>
  .abyss-gradient { background: radial-gradient(circle at top right, #0F4C5C 0%, #081C24 45%, #050E12 100%); }
  .bioluminescent-pulse { box-shadow: 0 0 20px rgba(92, 255, 209, 0.2); transition: all 0.5s ease; }
  .bioluminescent-pulse:hover { box-shadow: 0 0 40px rgba(92, 255, 209, 0.5); transform: translateY(-2px); }
</style>
</head>
<body class="bg-abyss-ink text-foam-white font-body-md selection:bg-bioluminescence selection:text-abyss-ink">

<div class="fixed inset-0 abyss-gradient z-0" id="particle-container"></div>

<a href="index.html" class="fixed top-6 left-6 z-20 flex items-center gap-3">
<img src="assets/images/flipoint-logo.png" alt="FLIPOINT" class="h-9 w-auto">
<span class="font-display-hero text-headline-md text-bioluminescence hidden sm:inline">FLIPOINT</span>
</a>

<main class="relative z-10 flex min-h-screen items-center justify-center px-margin-mobile md:px-margin-desktop py-24">
<div class="w-full max-w-[480px] glass-card rounded-card p-8 md:p-14 shadow-2xl relative overflow-hidden">
<div class="absolute -top-24 -right-24 w-48 h-48 bg-bioluminescence/10 rounded-full blur-[80px]"></div>
<div class="absolute -bottom-24 -left-24 w-48 h-48 bg-ocean-emerald/20 rounded-full blur-[80px]"></div>
<div class="relative z-20 flex flex-col items-center">
<div class="mb-10 text-center">
<img alt="FLIPOINT Logo" class="h-16 w-auto mb-6 mx-auto transition-transform duration-700 hover:scale-110" src="assets/images/flipoint-logo.png">
<h1 class="font-headline-md text-[24px] md:text-headline-md text-foam-white tracking-tight">Selamat Datang Kembali</h1>
<p class="text-on-surface-variant font-body-md mt-2 opacity-80">Masuk untuk melacak laporan dan poin konservasi Anda.</p>
</div>
<form class="w-full space-y-8" onsubmit="event.preventDefault(); window.location.href='profile.html';">
<div class="relative floating-label-input">
<input class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-foam-white focus:outline-none focus:border-bioluminescence/50 focus:ring-0 transition-all font-body-md" id="email" placeholder=" " type="email" required>
<label class="absolute left-4 top-4 text-on-surface-variant pointer-events-none transition-all origin-top-left" for="email">Alamat Email</label>
</div>
<div class="relative floating-label-input">
<input class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-foam-white focus:outline-none focus:border-bioluminescence/50 focus:ring-0 transition-all font-body-md" id="password" placeholder=" " type="password" required>
<label class="absolute left-4 top-4 text-on-surface-variant pointer-events-none transition-all origin-top-left" for="password">Password</label>
</div>
<div class="flex items-center justify-between text-data-sm">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-white/20 bg-transparent text-bioluminescence focus:ring-bioluminescence/20 transition-colors" type="checkbox">
<span class="text-on-surface-variant group-hover:text-foam-white transition-colors">Tetap masuk</span>
</label>
<a class="text-ocean-emerald hover:text-bioluminescence transition-colors font-medium" href="#">Lupa Password?</a>
</div>
<button class="w-full py-5 bg-bioluminescence text-on-secondary font-label-caps tracking-widest rounded-xl bioluminescent-pulse uppercase transition-all flex items-center justify-center space-x-2 group" type="submit">
<span>Masuk</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div class="flex items-center space-x-4 opacity-30">
<div class="flex-1 h-px bg-white"></div>
<span class="font-data-sm text-xs uppercase tracking-widest">ATAU</span>
<div class="flex-1 h-px bg-white"></div>
</div>
<button class="w-full py-4 border border-white/10 bg-white/5 hover:bg-white/10 text-foam-white rounded-xl transition-all flex items-center justify-center space-x-3 group" type="button">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.07-3.71 1.07-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.11s.13-1.45.35-2.11V7.05H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.95l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.05l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-md">Lanjutkan dengan Google</span>
</button>
</form>
<p class="mt-10 font-data-sm text-on-surface-variant">
Baru di FLIPOINT?
<a class="text-bioluminescence hover:underline underline-offset-4 decoration-bioluminescence/30" href="register.html">Buat Akun</a>
</p>
<div class="mt-6 pt-6 border-t border-white/5 w-full text-center">
<a href="admin.html" class="font-data-sm text-xs uppercase tracking-widest text-ocean-emerald hover:text-bioluminescence transition-colors flex items-center justify-center space-x-2 group">
<span class="material-symbols-outlined text-sm">terminal</span>
<span>Login Staf TCEC</span>
</a>
</div>
</div>
</div>
</main>

<script src="assets/js/site.js"></script>
</body>
</html>
